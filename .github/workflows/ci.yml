name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cxx: [g++, clang++]
    steps:
      - uses: actions/checkout@v6

      - name: Warning-free build gate
        run: |
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only fsmp.cpp
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only -DSFMT_NO_SSE2 fsmp.cpp
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only tools/pack_forcefield.cpp

      - name: Regression tests
        env:
          CXX: ${{ matrix.cxx }}
        run: python3 tests/run_tests.py

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regression tests (Apple clang)
        env:
          CXX: clang++
        run: python3 tests/run_tests.py

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc python

      - name: Regression tests (native Windows, MinGW g++)
        shell: msys2 {0}
        run: python3 tests/run_tests.py

      # Fresh development build of the Windows binaries: downloadable from the
      # workflow run page (Actions tab), kept for 90 days. Tagged releases are
      # built and published separately by release.yml.
      - name: Build static Windows binaries
        shell: msys2 {0}
        run: |
          g++ -O3 -static -Wall -Wextra fsmp.cpp -o fsmp.exe
          g++ -O3 -static -Wall -Wextra tools/pack_forcefield.cpp -o pack.exe

      - uses: actions/upload-artifact@v6
        with:
          name: fsmp-kmc-windows-x86_64-dev
          path: |
            fsmp.exe
            pack.exe
