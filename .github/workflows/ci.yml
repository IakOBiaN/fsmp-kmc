name: CI

# Branch pushes and pull requests only: a tag triggers the Release
# workflow, which runs the same test suite on all three platforms itself,
# so a second CI run for the tag would test the same commit twice.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cxx: [g++, clang++]
    steps:
      - uses: actions/checkout@v6

      - name: Warning-free build gate
        run: |
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only fsmp.cpp
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only -DSFMT_NO_SSE2 fsmp.cpp
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only tools/pack_forcefield.cpp

      - name: Regression tests
        env:
          CXX: ${{ matrix.cxx }}
        run: python3 tests/run_tests.py

  # The Studio suite: offscreen GUI tests (PySide6, rdkit, the MMFF
  # generator). The engine is built first so the end-to-end tests run
  # instead of skipping; dependencies come from gui/pyproject.toml.
  test-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # PySide6 needs the Qt runtime libraries even under the offscreen
      # platform (the same set the Release bundle build installs)
      - name: Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Build the engine for the end-to-end tests
        run: g++ -O2 fsmp.cpp -o fsmp.out

      - name: Install the GUI package
        run: pip install ./gui

      - name: GUI test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s gui/tests -v

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regression tests (Apple clang)
        env:
          CXX: clang++
        run: python3 tests/run_tests.py

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc python

      - name: Regression tests (native Windows, MinGW g++)
        shell: msys2 {0}
        run: python3 tests/run_tests.py

      # Fresh development build of the Windows binaries: downloadable from the
      # workflow run page (Actions tab), kept for 90 days. Tagged releases are
      # built and published separately by release.yml.
      - name: Build static Windows binaries
        shell: msys2 {0}
        run: |
          g++ -O3 -static -Wall -Wextra fsmp.cpp -o fsmp.exe
          g++ -O3 -static -Wall -Wextra tools/pack_forcefield.cpp -o pack.exe

      - uses: actions/upload-artifact@v6
        with:
          name: fsmp-kmc-windows-x86_64-dev
          path: |
            fsmp.exe
            pack.exe
