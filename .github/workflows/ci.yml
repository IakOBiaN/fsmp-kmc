name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cxx: [g++, clang++]
    steps:
      - uses: actions/checkout@v4

      - name: Warning-free build gate
        run: |
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only tests/hcp_small.cpp
          ${{ matrix.cxx }} -O2 -Wall -Wextra -Werror -fsyntax-only tools/pack_forcefield.cpp

      - name: Regression tests
        env:
          CXX: ${{ matrix.cxx }}
        run: bash tests/run_tests.sh
