name: Release

# A tag v* publishes the bundles to a GitHub release. A manual run
# (workflow_dispatch) is a dry run: it builds the same bundles and keeps
# them as workflow artifacts, nothing is published.
#
# The bundle layout itself lives in tools/make_bundle.py, shared with the
# local `make bundle`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # a tag must match version.h, the single source of the project version
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag matches version.h
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            grep -F "\"${GITHUB_REF_NAME#v}\"" version.h \
              || { echo "version.h does not carry $GITHUB_REF_NAME"; exit 1; }
          else
            echo "dry run: no tag to check"
          fi

  windows:
    needs: version-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc make python

      # the Makefile windows target: -static binaries with the version
      # resources (icon, Explorer Properties fields) attached by windres
      - name: Build static engine binaries
        shell: msys2 {0}
        run: make windows

      - name: Run the test suite
        shell: msys2 {0}
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        shell: msys2 {0}
        run: |
          cd tests
          ../fsmp.exe hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # A PyInstaller app carries a small C "bootloader" that unpacks and
      # starts it. Antivirus engines fingerprint the stock prebuilt bootloader
      # from the wheel and false-positive on it (Windows Defender quarantined
      # the 1.0.1 Studio exe). Building the bootloader from source gives it a
      # fresh signature and clears most of those flags: --no-binary forces
      # pyinstaller to build from its sdist instead of taking the wheel. The
      # windows-latest image ships MSVC, which the build finds on its own.
      - name: Build the bundle (Studio + engine + data, own bootloader)
        run: |
          pip install --no-binary pyinstaller pyinstaller
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      # the frozen app must prove RDKit and its MMFF tables actually froze in
      - name: Self-test the bundle
        shell: bash
        run: |
          bundle=$(ls -dt dist/fsmp-kmc-*/ | head -1)
          "${bundle}FSMP-kMC Studio.exe" --selftest selftest.log && ok=1 || ok=0
          cat selftest.log || true
          test "$ok" = 1

      - uses: actions/upload-artifact@v6
        with:
          name: bundle-windows-x86_64
          path: dist/fsmp-kmc-*.zip

  # Pinned to the oldest supported runner on purpose: a PyInstaller build
  # needs the user's glibc to be at least as new as the builder's, so
  # building on 22.04 (glibc 2.35) lets the Studio run on Ubuntu 22.04+.
  # The 22.04 image retires in April 2027; move this job into an
  # ubuntu:22.04 container before September 2026 (deprecation start).
  linux:
    needs: version-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Build static engine binaries
        run: |
          g++ -O3 -static -Wall -Wextra fsmp.cpp -o fsmp
          g++ -O3 -static -Wall -Wextra tools/pack_forcefield.cpp -o pack

      - name: Run the test suite
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        run: |
          cd tests
          ../fsmp hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # PySide6 needs the Qt runtime libraries even to be imported, which
      # PyInstaller does while analyzing
      - name: Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Build the bundle (Studio + engine + data)
        run: |
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      - name: Self-test the bundle
        run: |
          bundle=$(ls -dt dist/fsmp-kmc-*/ | head -1)
          "${bundle}FSMP-kMC Studio" --selftest selftest.log && ok=1 || ok=0
          cat selftest.log || true
          test "$ok" = 1

      - uses: actions/upload-artifact@v6
        with:
          name: bundle-linux-x86_64
          path: dist/fsmp-kmc-*.tar.gz

  # experimental: built and tested only in CI, unsigned (macOS 15+ blocks the
  # first launch until the user allows it in Privacy & Security settings)
  macos:
    needs: version-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build engine binaries
        run: |
          clang++ -O3 -Wall -Wextra fsmp.cpp -o fsmp
          clang++ -O3 -Wall -Wextra tools/pack_forcefield.cpp -o pack

      - name: Run the test suite
        env:
          CXX: clang++
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        run: |
          cd tests
          ../fsmp hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build the bundle (Studio + engine + data)
        run: |
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      - name: Self-test the bundle
        run: |
          bundle=$(ls -dt dist/fsmp-kmc-*/ | head -1)
          "${bundle}FSMP-kMC Studio.app/Contents/MacOS/FSMP-kMC Studio" \
            --selftest selftest.log && ok=1 || ok=0
          cat selftest.log || true
          test "$ok" = 1

      - uses: actions/upload-artifact@v6
        with:
          name: bundle-macos-arm64
          path: dist/fsmp-kmc-*.tar.gz

  # One publisher after all builds: three jobs racing to create the same
  # release tripped GitHub's flaky release-fetch endpoint (softprops
  # action-gh-release issues 612/637). gh ships with the runner, and the
  # view-create-upload sequence is idempotent, so a failed publish can be
  # re-run safely. The experimental macos bundle is welcome but optional:
  # windows and linux alone are enough to publish.
  publish:
    if: always() && github.ref_type == 'tag'
        && needs.windows.result == 'success'
        && needs.linux.result == 'success'
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: bundle-*
          path: bundles
          merge-multiple: true

      # SHA256SUMS.txt lets a download be verified:
      #   sha256sum -c --ignore-missing SHA256SUMS.txt
      - name: Checksums of the bundles
        run: cd bundles && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      # The release body: a short how-to-install preamble, then the
      # auto-generated changelog. A re-run keeps an existing release as is.
      - name: Create the release and upload the bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -l bundles
          cat > notes.md <<'EOF'
          Self-contained bundles per platform: unpack, put the downloaded
          potentials into `forcefields/` and start the Studio, or run the
          engine from the command line. `README.txt` inside the archive
          walks through it.

          The binaries are not code-signed (usual for academic software):
          Windows SmartScreen warns on the first launch of a downloaded
          copy (More info → Run anyway); macOS 15+ blocks it until allowed
          in System Settings → Privacy & Security → Open Anyway (older
          macOS: right-click → Open). A download can be verified against
          `SHA256SUMS.txt`: `sha256sum -c --ignore-missing SHA256SUMS.txt`.
          EOF
          echo >> notes.md
          gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" --jq .body >> notes.md
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file notes.md
          gh release upload "$GITHUB_REF_NAME" bundles/* --repo "$GITHUB_REPOSITORY" --clobber
