name: Release

# A tag v* publishes the bundles to a GitHub release. A manual run
# (workflow_dispatch) is a dry run: it builds the same bundles and keeps
# them as workflow artifacts, nothing is published.
#
# The bundle layout itself lives in tools/make_bundle.py, shared with the
# local `make bundle`.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc python

      # -static bakes the MinGW runtime in, so the exe runs on any Windows
      # machine with no extra DLLs
      - name: Build static engine binaries
        shell: msys2 {0}
        run: |
          g++ -O3 -static -Wall -Wextra fsmp.cpp -o fsmp.exe
          g++ -O3 -static -Wall -Wextra tools/pack_forcefield.cpp -o pack.exe

      - name: Run the test suite
        shell: msys2 {0}
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        shell: msys2 {0}
        run: |
          cd tests
          ../fsmp.exe hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the bundle (Studio + engine + data)
        run: |
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows-x86_64
          path: dist/fsmp-kmc-*.zip

      - name: Publish to the release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fsmp-kmc-*.zip
          generate_release_notes: true

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static engine binaries
        run: |
          g++ -O3 -static -Wall -Wextra fsmp.cpp -o fsmp
          g++ -O3 -static -Wall -Wextra tools/pack_forcefield.cpp -o pack

      - name: Run the test suite
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        run: |
          cd tests
          ../fsmp hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # PySide6 needs the Qt runtime libraries even to be imported, which
      # PyInstaller does while analyzing
      - name: Qt runtime libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Build the bundle (Studio + engine + data)
        run: |
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-x86_64
          path: dist/fsmp-kmc-*.tar.gz

      - name: Publish to the release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fsmp-kmc-*.tar.gz
          generate_release_notes: true

  # experimental: built and tested only in CI, unsigned (macOS will ask to
  # confirm the first launch via right-click -> Open)
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build engine binaries
        run: |
          clang++ -O3 -Wall -Wextra fsmp.cpp -o fsmp
          clang++ -O3 -Wall -Wextra tools/pack_forcefield.cpp -o pack

      - name: Run the test suite
        env:
          CXX: clang++
        run: python3 tests/run_tests.py

      - name: Smoke-test the release binary
        run: |
          cd tests
          ../fsmp hcp_small.txt > release_smoke.log
          python3 check_energy.py release_smoke.log -61.7449 0.001

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build the bundle (Studio + engine + data)
        run: |
          pip install "./gui[build]"
          python tools/make_bundle.py --name ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-macos-arm64
          path: dist/fsmp-kmc-*.tar.gz

      - name: Publish to the release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fsmp-kmc-*.tar.gz
          generate_release_notes: true
