<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FSMP-kMC mark</title>
  <desc id="desc">A central molecular crystal stabilized by two fields, with smaller gas-phase molecules on both sides of the simulation cell.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#153438"/>
      <stop offset="1" stop-color="#0A1A1C"/>
    </linearGradient>
    <linearGradient id="cellStroke" x1="72" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#159D96"/>
      <stop offset="0.24" stop-color="#159D96"/>
      <stop offset="0.42" stop-color="#D8B74D"/>
      <stop offset="0.58" stop-color="#D8B74D"/>
      <stop offset="0.76" stop-color="#159D96"/>
      <stop offset="1" stop-color="#159D96"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#061314" flood-opacity="0.25"/>
    </filter>
    <g id="mol" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="4.5" fill="currentColor" stroke="none"/>
      <path d="M0 0 L0 -22 M0 0 L19 11 M0 0 L-19 11"/>
      <circle cx="0" cy="-29" r="7"/>
      <circle cx="25" cy="14.5" r="7"/>
      <circle cx="-25" cy="14.5" r="7"/>
    </g>
  </defs>
  <rect width="512" height="512" rx="92" fill="#F8FAF6"/>
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="416" height="416" rx="78" fill="url(#bg)"/>
    <rect x="68" y="108" width="376" height="260" rx="34" fill="#E9F7F2" fill-opacity="0.045" stroke="url(#cellStroke)" stroke-width="4"/>
    <rect x="82" y="124" width="86" height="228" rx="24" fill="#159D96" fill-opacity="0.13"/>
    <rect x="344" y="124" width="86" height="228" rx="24" fill="#159D96" fill-opacity="0.13"/>
    <rect x="174" y="124" width="46" height="228" rx="20" fill="#D8B74D" fill-opacity="0.14"/>
    <rect x="292" y="124" width="46" height="228" rx="20" fill="#D8B74D" fill-opacity="0.14"/>
    <g color="#F1FAF5">
      <use href="#mol" transform="translate(228 181) scale(0.62) rotate(0)"/>
      <use href="#mol" transform="translate(284 181) scale(0.62) rotate(60)"/>
      <use href="#mol" transform="translate(200 232) scale(0.62) rotate(60)"/>
      <use href="#mol" transform="translate(256 232) scale(0.62) rotate(0)"/>
      <use href="#mol" transform="translate(312 232) scale(0.62) rotate(60)"/>
      <use href="#mol" transform="translate(228 283) scale(0.62) rotate(0)"/>
      <use href="#mol" transform="translate(284 283) scale(0.62) rotate(60)"/>
    </g>
    <g color="#D8B74D" opacity="0.95">
      <use href="#mol" transform="translate(113 175) scale(0.35) rotate(-22)"/>
      <use href="#mol" transform="translate(145 263) scale(0.35) rotate(38)"/>
      <use href="#mol" transform="translate(105 327) scale(0.35) rotate(96)"/>
      <use href="#mol" transform="translate(399 176) scale(0.35) rotate(24)"/>
      <use href="#mol" transform="translate(367 263) scale(0.35) rotate(-42)"/>
      <use href="#mol" transform="translate(407 327) scale(0.35) rotate(82)"/>
    </g>
    <text x="256" y="424" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#F4FBF6">FSMP</text>
  </g>
