    <rect x="146" y="140" width="988" height="292" rx="40" fill="#E9F7F2" fill-opacity="0.045" stroke="url(#cellStroke)" stroke-width="5"/>
    <rect x="172" y="162" width="210" height="248" rx="32" fill="#159D96" fill-opacity="0.13"/>
    <rect x="898" y="162" width="210" height="248" rx="32" fill="#159D96" fill-opacity="0.13"/>
    <rect x="408" y="162" width="76" height="248" rx="28" fill="#D8B74D" fill-opacity="0.14"/>
