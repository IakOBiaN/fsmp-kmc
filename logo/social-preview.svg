<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">FSMP-kMC social preview</title>
  <desc id="desc">GitHub preview for FSMP-kMC, showing a central molecular crystal, gas reservoirs on both sides, and two field regions inside the simulation cell.</desc>
  <defs>
    <linearGradient id="panel" x1="116" y1="76" x2="1164" y2="564" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#153438"/>
      <stop offset="1" stop-color="#0A1A1C"/>
    </linearGradient>
    <linearGradient id="cellStroke" x1="146" y1="0" x2="1134" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#159D96"/>
      <stop offset="0.24" stop-color="#159D96"/>
      <stop offset="0.42" stop-color="#D8B74D"/>
      <stop offset="0.58" stop-color="#D8B74D"/>
      <stop offset="0.76" stop-color="#159D96"/>
      <stop offset="1" stop-color="#159D96"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%">
