<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">FSMP-kMC logo</title>
  <desc id="desc">Logo for Field-Stabilized Multiphase kinetic Monte Carlo: a central molecular crystal, gas molecules on both sides, and two stabilizing fields inside the cell.</desc>
  <defs>
    <linearGradient id="markBg" x1="64" y1="42" x2="340" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#153438"/>
      <stop offset="1" stop-color="#0A1A1C"/>
    </linearGradient>
    <linearGradient id="cellStroke" x1="82" y1="0" x2="322" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#159D96"/>
      <stop offset="0.24" stop-color="#159D96"/>
      <stop offset="0.42" stop-color="#D8B74D"/>
      <stop offset="0.58" stop-color="#D8B74D"/>
      <stop offset="0.76" stop-color="#159D96"/>
      <stop offset="1" stop-color="#159D96"/>
    </linearGradient>
    <linearGradient id="word" x1="396" y1="0" x2="850" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#102628"/>
      <stop offset="1" stop-color="#254E51"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#061314" flood-opacity="0.18"/>
    </filter>
    <g id="mol" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="4.5" fill="currentColor" stroke="none"/>
      <path d="M0 0 L0 -22 M0 0 L19 11 M0 0 L-19 11"/>
      <circle cx="0" cy="-29" r="7"/>
      <circle cx="25" cy="14.5" r="7"/>
      <circle cx="-25" cy="14.5" r="7"/>
    </g>
  </defs>
  <rect width="1200" height="360" fill="#F8FAF6"/>
  <g filter="url(#shadow)">
    <rect x="64" y="42" width="276" height="276" rx="50" fill="url(#markBg)"/>
    <rect x="82" y="88" width="240" height="166" rx="23" fill="#E9F7F2" fill-opacity="0.045" stroke="url(#cellStroke)" stroke-width="3"/>
    <rect x="92" y="100" width="54" height="142" rx="16" fill="#159D96" fill-opacity="0.13"/>
    <rect x="258" y="100" width="54" height="142" rx="16" fill="#159D96" fill-opacity="0.13"/>
    <rect x="150" y="100" width="28" height="142" rx="14" fill="#D8B74D" fill-opacity="0.14"/>
    <rect x="226" y="100" width="28" height="142" rx="14" fill="#D8B74D" fill-opacity="0.14"/>
    <g color="#F1FAF5">
      <use href="#mol" transform="translate(190 135) scale(0.38) rotate(0)"/>
      <use href="#mol" transform="translate(218 135) scale(0.38) rotate(60)"/>
      <use href="#mol" transform="translate(176 168) scale(0.38) rotate(60)"/>
      <use href="#mol" transform="translate(204 168) scale(0.38) rotate(0)"/>
      <use href="#mol" transform="translate(232 168) scale(0.38) rotate(60)"/>
      <use href="#mol" transform="translate(190 201) scale(0.38) rotate(0)"/>
      <use href="#mol" transform="translate(218 201) scale(0.38) rotate(60)"/>
    </g>
    <g color="#D8B74D" opacity="0.95">
      <use href="#mol" transform="translate(111 129) scale(0.22) rotate(-22)"/>
      <use href="#mol" transform="translate(130 181) scale(0.22) rotate(38)"/>
      <use href="#mol" transform="translate(106 225) scale(0.22) rotate(96)"/>
      <use href="#mol" transform="translate(293 129) scale(0.22) rotate(24)"/>
      <use href="#mol" transform="translate(274 181) scale(0.22) rotate(-42)"/>
      <use href="#mol" transform="translate(298 225) scale(0.22) rotate(82)"/>
    </g>
    <text x="202" y="301" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#F4FBF6">FSMP</text>
  </g>
  <g>
    <text x="396" y="185" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#word)">FSMP-kMC</text>
    <text x="401" y="237" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#536F6C" letter-spacing="1.2">Field-Stabilized Multiphase kinetic Monte Carlo</text>
  </g>
</svg>
